    // 创建20km范围圈
    function createCircles() {
      wharfs.forEach(wharf => {
        const circle = new AMap.Circle({
          center: [wharf.lng, wharf.lat],
          radius: 20000,
          fillColor: wharf.color,
          fillOpacity: 0.12,
          strokeColor: wharf.color,
          strokeOpacity: 0.35,
          strokeWeight: 2.5,
          zIndex: 10
        });
        circle.setMap(map);
        circles.push(circle);
      });
    }

    // 创建连接线
    function createConnections() {
      stations.forEach(station => {
        if (station['优先级'] === 'none') return;

        const wharf = wharfs.find(w => w.id === station['最近码头']);
        if (wharf) {
          const polyline = new AMap.Polyline({
            path: [[wharf.lng, wharf.lat], [station.lng, station.lat]],
            borderWeight: 1,
            strokeColor: wharf.color,
            strokeOpacity: 0.5,
            strokeWeight: 3,
            lineJoin: 'round',
            zIndex: 5
          });
          polyline.setMap(map);
          polylines.push(polyline);
        }
      });
    }

    // 创建需求热力图（模拟）
    function createHeatmap() {
      // 需求热力图使用半透明圆形表示需求密度
      stations.forEach(station => {
        if (station['优先级'] === 'none') return;

        const demandLevel = {
          'high': { radius: 8000, opacity: 0.25, color: '#ff4d4f' },
          'medium': { radius: 6000, opacity: 0.18, color: '#ffc069' },
          'low': { radius: 4000, opacity: 0.12, color: '#b7eb8f' }
        };

        const level = demandLevel[station['优先级']] || demandLevel['medium'];

        const heatmap = new AMap.Circle({
          center: [station.lng, station.lat],
          radius: level.radius,
          fillColor: level.color,
          fillOpacity: level.opacity,
          strokeColor: level.color,
          strokeOpacity: 0.4,
          strokeWeight: 1.5,
          zIndex: 3
        });
        heatmap.setMap(map);
        heatmap.layerType = 'heatmap';
        circles.push(heatmap);
      });
    }

      });

      // 竞争对手列表
      const competitorList = document.getElementById('competitor-list');
      competitors.forEach(competitor => {
        const card = document.createElement('div');
        card.className = 'card';

        const threatClass = {
          'extreme': 'threat-extreme',
          'high': 'threat-high',
          'medium': 'threat-medium',
          'low': 'threat-low'
        }[competitor['威胁度']];

        const threatText = {
          'extreme': '极高威胁',
          'high': '高威胁',
          'medium': '中威胁',
          'low': '低威胁'
        }[competitor['威胁度']];

        card.innerHTML = `
          <div class="card-header">
            <span class="card-title">⚔️ ${competitor.name}</span>
            <span class="threat-badge ${threatClass}">${threatText}</span>
          </div>
          <div class="card-stats">
            <div class="stat-box">
              <div class="stat-box-label">总成本</div>
              <div class="stat-box-value">${competitor['总成本']}元</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">税点</div>
              <div class="stat-box-value" style="color:${competitor['税点'] >= 13 ? '#f5222d' : '#52c41a'};">${competitor['税点']}%</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">日产量</div>
              <div class="stat-box-value">${competitor['日产量'] || '-'}</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">成本优势</div>
              <div class="stat-box-value">${competitor['成本优势']}</div>
            </div>
          </div>
          <div style="font-size:12px;color:#666;">
            <p style="margin:3px 0;"><strong>销售模式:</strong> ${competitor['销售模式']}</p>
            <p style="margin:3px 0;"><strong>供应稳定性:</strong> ${competitor['供应稳定性']}</p>
            <p style="margin:3px 0;"><strong>资源储量:</strong> ${competitor['资源储量'] || '-'}万吨</p>
          </div>
          <div class="market-trend">
            <div class="trend-label">⚠️ 威胁原因:</div>
            <div class="trend-value">${competitor['威胁原因']}</div>
          </div>
        `;
        card.onclick = () => focusCompetitor(competitor.id);
        competitorList.appendChild(card);
      });
    }

    // 聚焦功能
    function focusWharf(wharfId) {
      const wharfMarker = markers.find(m => m.type === 'wharf' && m.data.id === wharfId);
      if (wharfMarker) {
        infoWindows.forEach(iw => iw.close());
        map.setCenter(wharfMarker.marker.getPosition());
        map.setZoom(13);
        wharfMarker.marker.emit('click', { target: wharfMarker.marker });
      }
    }

    function focusStation(index) {
      const stationMarker = markers.find(m => m.type === 'station' && m.data.id === index);
      if (stationMarker) {
        infoWindows.forEach(iw => iw.close());
        map.setCenter(stationMarker.marker.getPosition());
        map.setZoom(13);
        stationMarker.marker.emit('click', { target: stationMarker.marker });
      }
    }

    function focusCompetitor(competitorId) {
      const competitorMarker = markers.find(m => m.type === 'competitor' && m.data.id === competitorId);
      if (competitorMarker) {
        infoWindows.forEach(iw => iw.close());
        map.setCenter(competitorMarker.marker.getPosition());
        map.setZoom(12);
        competitorMarker.marker.emit('click', { target: competitorMarker.marker });
      }
    }

    // 绑定控制事件
    function bindControlEvents() {
      // 视图切换
      document.getElementById('viewSelect').addEventListener('change', function(e) {
        const view = e.target.value;

        const wharfMarkers = markers.filter(m => m.type === 'wharf');
        const stationMarkers = markers.filter(m => m.type === 'station');
        const competitorMarkers = markers.filter(m => m.type === 'competitor');
        const rangeCircles = circles.filter(c => !c.layerType);
        const heatmapCircles = circles.filter(c => c.layerType === 'heatmap');

        // 重置所有图层按钮状态
        document.querySelectorAll('.toggle-btn').forEach(btn => {
          btn.classList.add('active');
        });

        wharfMarkers.forEach(m => m.marker.setVisible(view === 'all' || view === 'wharfs' || view === 'range'));
        stationMarkers.forEach(m => m.marker.setVisible(view === 'all' || view === 'stations'));
        competitorMarkers.forEach(m => m.marker.setVisible(view === 'all' || view === 'competitors'));
        rangeCircles.forEach(c => c.setMap((view === 'all' || view === 'wharfs' || view === 'range') ? map : null));
        polylines.forEach(p => p.setMap((view === 'all' || view === 'stations' || view === 'range') ? map : null));
        heatmapCircles.forEach(c => c.setMap((view === 'all' || view === 'stations') ? map : null));
      });

      // 图层切换 - 简化版,独立控制
      console.log('开始绑定图层切换事件,按钮数量:', document.querySelectorAll('.toggle-btn').length);
      document.querySelectorAll('.toggle-btn').forEach((btn, index) => {
        console.log('绑定按钮', index, 'data-layer:', btn.dataset.layer);
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const layer = this.dataset.layer;
          console.log('点击图层按钮:', layer);
          this.classList.toggle('active');

          const isActive = this.classList.contains('active');
          console.log('图层状态:', layer, 'visible:', isActive);

          // 独立控制每个图层,不受视图影响
          switch (layer) {
            case 'wharfs':
              const wharfCount = markers.filter(m => m.type === 'wharf').length;
              console.log('切换码头图层,标记数量:', wharfCount);
              markers.filter(m => m.type === 'wharf').forEach(m => {
                console.log('码头标记对象:', m.marker);
                m.marker.setMap(isActive ? map : null);
              });
              break;
            case 'stations':
              const stationCount = markers.filter(m => m.type === 'station').length;
              console.log('切换搅拌站图层,标记数量:', stationCount);
              markers.filter(m => m.type === 'station').forEach(m => {
                console.log('搅拌站标记对象:', m.marker);
                m.marker.setMap(isActive ? map : null);
              });
              break;
            case 'range':
              const rangeCount = circles.filter(c => !c.layerType).length;
              console.log('切换20km范围图层,圆圈数量:', rangeCount);
              circles.filter(c => !c.layerType).forEach(c => c.setMap(isActive ? map : null));
              break;
            case 'connections':
              const connCount = polylines.length;
              console.log('切换连接线图层,线条数量:', connCount);
              polylines.forEach(p => p.setMap(isActive ? map : null));
              break;
            case 'competitors':
              const compCount = markers.filter(m => m.type === 'competitor').length;
              console.log('切换竞争对手图层,标记数量:', compCount);
              markers.filter(m => m.type === 'competitor').forEach(m => {
                console.log('竞争对手标记对象:', m.marker);
                m.marker.setMap(isActive ? map : null);
              });
              break;
            case 'heatmap':
              const heatCount = circles.filter(c => c.layerType === 'heatmap').length;
              console.log('切换需求热度图层,热力圈数量:', heatCount);
              circles.filter(c => c.layerType === 'heatmap').forEach(c => c.setMap(isActive ? map : null));
              break;
          }
        });
      });
    }

    // 页面加载完成后初始化地图
    window.onload = initMap;
  </script>
</body>
</html>
